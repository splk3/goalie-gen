---
name: Goalie Square Passing and Skating

description: Players skate and pass while goalie follows along with play.

drill_steps: |-
  1. Goalie starts lined up with the puck.
  2. Player can either pass or skate.
  3. Wherever that player skates to, that corresponding player will skate for a scissor pass or to trade places.
  4. Each round goes for about 45 seconds.
  5. If a player taps their stick, the goalie must butterfly before making the movement.

coaching_focus_points: |-
  - Hinging your lead foot before making t-pushes.
  - Stay square to the puck.
  - Squeeze knees together on butterfly.

shooter_focus_points: |-
  - Clean passes.
  - Communicate with teammates.
  - Drop scissor passes to the outside.

