name: Tight Turn Transition Passing
description: Transitions around pads with passing.
drill_steps: |-
  1. Drill starts with X carrying the puck.
  2. Skate above the first pad, then pass to the coach.
  3. Transition around the pad to skate backwards while facing the puck and receive the return pass.
  4. Carry the puck above the second pad and pass to the coach again.
  5. Transition around while facing the puck, receive the pass back, and carry above the final pad.
  6. Receive a touch pass from the coach and finish with a shot.
coaching_focus_points: |-
  - Follow the puck through all of the passes.
  - Challenge the shooter.
  - Stay on stick angle and track all of the way into your body.
shooter_focus_points: |-
  - Catch and give passes on backhand when appropriate.
  - Transition at proper timing.
  - Present a passing target.
