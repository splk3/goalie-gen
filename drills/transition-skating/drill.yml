name: Transition Skating

drill_steps: |-
  1. Players skate up ice and stay facing up ice while transitioning around the cones.

coaching_focus_points: |-
  - Follow player in the last couple cones.
  - Set on stick angle for shot.
  - Adjust depth when player comes in.

shooter_focus_points: |-
  - Eyes up and not on the puck.
  - Smooth transitions.
  - Shoot before hash marks.

