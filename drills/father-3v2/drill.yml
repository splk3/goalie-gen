name: Father 3v2
description: 3v2 gap up zone entry.
drill_steps: |-
  1. X line up on the blue line.
  2. O's line up top of the circles.
  3. On the whistle, the X's gap up to the red line and O's gap up to the blue line.
  4. Coach passes to whoever is closest to the blue line.
  5. Players play 3v2 until the coach blows the whistle or the goalie covers it.
coaching_focus_points: |-
  - Depth management as players enter blue line.
  - Communication with their defenders.
  - Identify threats on the weak side of the ice.
shooter_focus_points: |-
  - Center drive to the net.
  - Challenge defenseman and creating speed.
  - Gap up closer than comfortable with and put stick on lanes to break up plays.
