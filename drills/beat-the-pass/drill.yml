---
name: Beat The Pass

drill_steps:
  - Coach starts with a puck at the top.
  - Coach passes to either Shooter 1 or Shooter 2.
  - The first shooter immediately one-touches or quickly moves the puck to the opposite shooter.
  - The second shooter receives the pass and shoots in stride.

coaching_focus_points:
  - Stay on edges and on feet / no premature drops - Maintain strong edges and patience; read the pass before committing.
  - Lead knee tracks the puck - Keep the knee and chest square to the puck as it moves east-west.
  - Hands out in front - Present hands early to smother or control rebounds.
  - Beat the pass with feet, not a slide - Push, stop, set - avoid drifting into the shot.
  - Head leads the movement - Eyes snap to the puck first, then body follows.
  - Rebound control - Direct rebounds to corners or smother when possible.

shooter_focus_points:
  - Crisp, accurate passes - Put the puck in the shooting pocket; no bobbles.
  - Sell the shot before passing - Force the goalie to hold their edges.
  - Catch and release quickly - Minimize dusting the puck off.
  - Shoot in stride - Maintain deception and pace.
  - Read the goalie - If the goalie over-pushes, shoot back against the grain.
  - Keep body language consistent - Don't telegraph whether you're passing or shooting.

drill_image: beat-the-pass.png

drill_progressions:
  - progression_name: Progression 1 - One-Touch Passing
    progression_description: Both shooters must one-touch the puck. (Forces quicker goalie reads and sharper shooter execution.)
  - progression_name: Progression 2 - Coach Adds a Fake
    progression_description: Coach fakes a pass to one shooter before sending it to the other. (Goalie must stay patient and avoid biting early.)
  - progression_name: Progression 3 - Shooter Shot Options
    progression_description: "Second shooter may: catch-and-release shot, one-timer, or pull-and-shoot (drag laterally). Goalie must adjust depth and angle based on release type."
  - progression_name: 'Progression 4 - Add a Middle "Screen" Player'
    progression_description: Place a stationary or lightly moving screen player between shooters. Goalie must maintain sightlines, track through traffic, and stay patient on delayed releases.
    progression_image: progression-4.png
  - progression_name: Progression 5 - Add a Rebound Threat
    progression_description: After the shot, the opposite shooter crashes for a rebound. Goalie must control rebounds and recover quickly.
  - progression_name: Progression 6 - Random Second Pass
    progression_description: "After receiving the first pass, Shooter 1 may: shoot immediately, pass across, or delay and then pass. Forces the goalie to read stick, body, and timing cues."
    progression_image: progression-6.png
  - progression_name: Progression 7 - Add Lateral Movement for Goalie
    progression_description: Start goalie slightly off-angle or require a pre-movement shuffle. Increases difficulty in arriving set before the shot.
    progression_image: progression-7.png

