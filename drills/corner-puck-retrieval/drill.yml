name: Corner Puck Retrieval

drill_steps: |-
  Coach dumps a puck over the pad. Player skates below and retrieves it. They can skate up over the pad and down below and drive the net. Quick shot and follow rebound.

coaching_focus_points: |-
  - Follow puck the entire time.
  - Seal the post if they drive low.
  - Control rebounds to the corner.

shooter_focus_points: |-
  - Quick turn and get out.
  - Quick shot and retrieve rebound.

drill_image: corner-puck-retrieval.png

