name: Neutral Zone 3v3 Angling Game

description: 3v3 neutral zone angling.

drill_steps: |-
  1. On the whistle, X's start with possession and the first 3 players take off from behind the far net.
  2. O's start at the same time, gap up, and angle the rush.
  3. Play 3v3 for 30-45 seconds.

coaching_focus_points: |-
  - Get up ice quickly and force players to the outside.
  - Use speed to beat the other team.

shooter_focus_points: |-
  - Recognize passing options.
  - Communicate with teammates.
  - Recover to feet when possible.

