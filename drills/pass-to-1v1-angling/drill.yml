---
name: Pass to 1v1 Angling

description: 1v1 angling starting with a pass.

drill_steps: |-
  1. X passes to O.
  2. O takes off with the puck.
  3. X skates to the opposite player to angle.
  4. O is trying to score while X tries to get the puck to the designated area in the middle of the ice (as decided by the coach).

coaching_focus_points: |-
  - Stay on stick angle.
  - Have a competitive depth.
  - Small adjustment with shooter.
  - Start on near post then come out to challenge.

shooter_focus_points: |-
  - Take off quick.
  - Clean passes.
  - Go through hands.

