name: Blaze Pod Footwork
description: |-
  4-6 light pods arranged in a wide arc around the crease.
  Pods are placed just outside the crease.
  Goalie starts in a ready stance centered at the top of the crease.
  Duration: 20-40 seconds per rep (adjustable).
  "Lights out" setting determines how quickly a pod deactivates after being reached.
drill_steps: |-
  1. Start in ready position at the top of the crease.
  2. First light activates; goalie immediately shuffles to that pod, staying square and maintaining stance height.
  3. As soon as the goalie arrives, the next light activates somewhere along the arc.
  4. Goalie shuffles in an arc pattern, never crossing feet and never turning hips away from the imaginary puck.
  5. Continue reacting to each new light for the full duration.
  6. Reset between reps with a short rest (20-30 seconds).
  7. See the progressions section for sample BlazePods configurations.
coaching_focus_points: |-
  - Stay loaded - knees flexed, chest tall, hands active.
  - Head first - eyes snap to the next light before the feet move.
  - Short, powerful shuffles - avoid drifting or over shuffling.
shooter_focus_points: |-
  - Vary the timing between lights to prevent anticipation.
  - Reinforce posture: if the goalie rises too tall, slow the drill and reset technique.
  - Keep verbal cues minimal; let the lights be the stimulus.
drill_image: blaze-pod-footwork.png
drill_progressions:
  - progression_name: Progression 1 - T-Push
    progression_description: |-
      Goalie starts in ready stance centered on the goal line and performs a series of T-pushes.
      Technical focus:
      - Push off the correct edge, rotate hips first, and arrive square.
      - Lead with the eyes (head snaps to the next light before the push).
      - Hip rotation first - point the toe, open the hip, then drive.
      - Use an explosive first push with a controlled stop.
      - Reinforce clean stops with no drifting past the pod.
    progression_image: progression-1.png
  - progression_name: Progression 2 - Power Push
    progression_description: |-
      Goalie begins in a butterfly centered at the top of the crease.
      On first light activation, the goalie performs a controlled butterfly slide to that pod.
      Technical focus:
      - Eyes first (head snaps to the next light before initiating the slide).
      - Use a strong push leg by fully loading the edge before driving.
      - Keep chest tall in the butterfly and maintain glove and blocker positioning during slides.
    progression_image: progression-2.png
  - progression_name: Progression 3 - Mirror
    progression_description: |-
      Place a large pad or divider in the crease area to separate two goalies.
      - Goalie A works on the BlazePod side.
      - Goalie B mirrors on the non-pod side.
      Progress through:
      - Shuffle
      - T-push
      - Butterfly slide
      - Power push
    progression_image: progression-3.png
  - progression_name: Sample Program
    progression_description: |-
      This image shows a sample BlazePods configuration for this drill.
      Suggested settings:
      - 6 pods
      - 1 goalie
      - Single color activation
      - 30 seconds total drill time
      - 2 seconds between each light change
      Adjust as desired for your goalie.
    progression_image: progression-4.png
