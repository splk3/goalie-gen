name: Puck Recovery Shooting
description: Working on handling puck off an object and finding the puck at their feet.
drill_steps: |-
  1. Start with players facing the cone.
  2. The first player in line gets into a ready stance while the second player in line dumps a puck toward the net while facing backwards.
  3. The first player retrieves the puck, then either pushes or pulls around the net and takes a quick shot before the dot.
  4. Play the rebound if it comes out front.
coaching_focus_points: |-
  - Execute a butterfly save and recover as the puck hits the net.
  - Recover while maintaining proper stick angle and positioning.
  - Control rebounds.
shooter_focus_points: |-
  - Push or pull the puck in the direction it is favoring.
  - Quick release of shot.
  - Go to the net for rebound.
