extends: default
rules:
  line-length:
    max: 600
    level: warning
  document-start: disable
  truthy: disable
  comments: disable
  comments-indentation: disable
  indentation:
    spaces: 2
    indent-sequences: true
    check-multi-line-strings: false
  braces:
    min-spaces-inside: 0
    max-spaces-inside: 1
