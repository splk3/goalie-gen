name: Documentation Issue
description: Report missing or improve existing documentation
title: "Documentation Issue - ISSUE-NAME-HERE"
labels:
  - documentation
body:
  - type: textarea
    id: doc_issue
    attributes:
      label: What documentation issue did you encounter?
      description: Describe what documentation is missing, unclear, or needs improvement.
      placeholder: |
        e.g., "The drill template documentation doesn't explain how to format coaching points" 
        or "The README is missing information about..."
    validations:
      required: true

  - type: textarea
    id: affected_area
    attributes:
      label: Where is this documentation needed?
      description: Specify which part of the docs or README this relates to (e.g., drill creation, deployment, local development).
      placeholder: |
        Examples: README.md, Contributing guide, Drill creation guide, API reference, etc.
    validations:
      required: true

  - type: textarea
    id: proposed_content
    attributes:
      label: Proposed documentation content (optional)
      description: If you have suggestions for what should be documented, include them here.
      placeholder: Suggested text, examples, diagrams, or links to reference material...

  - type: textarea
    id: impact
    attributes:
      label: Who is impacted by missing/unclear documentation?
      description: Describe who needs this documentation (e.g., contributors, coaches, drill creators, developers).
      placeholder: |
        e.g., "Coaches trying to create custom development plans" 
        or "New contributors setting up the development environment"
    validations:
      required: true

  - type: checkboxes
    id: doc_type
    attributes:
      label: Type of documentation
      description: What kind of documentation is needed?
      options:
        - label: User Guide (how to use the site)
        - label: Developer Guide (development setup, contributing code)
        - label: Drill Creator Guide (how to create/submit drills)
        - label: API/Technical Reference
        - label: Troubleshooting Guide
        - label: Other
