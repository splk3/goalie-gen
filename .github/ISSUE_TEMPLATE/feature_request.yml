name: Feature request
description: Suggest an idea for this project
title: "Feature Request - ISSUE-NAME-HERE"
labels:
  - enhancement
body:
  - type: textarea
    id: feature_request
    attributes:
      label: What is the feature or resource you would like to see added?
      description: A clear and concise description of the feature request.
      placeholder: It would be helpful if...
    validations:
      required: true

  - type: textarea
    id: proposed_solution
    attributes:
      label: Describe the solution you'd like
      description: A clear and concise description of the solution you envision.
      placeholder: I would like to see this feature implemented by...
    validations:
      required: true

  - type: textarea
    id: additional_context
    attributes:
      label: Additional context
      description: Add any other information or screenshots about the feature request here.
