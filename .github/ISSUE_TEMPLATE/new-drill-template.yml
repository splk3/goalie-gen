name: Add a New Drill
description: Use this template to submit a new drill for the site
title: "Add a new drill - [DRILL NAME HERE]"
labels:
  - goalie-drills
projects:
  - splk3/1
assignees:
  - splk3
body:
  - type: markdown
    attributes:
      value: |
        ## Submitter Instructions

        - Fill out the drill information by answering the questions below.
        - Attach any diagrams/images to this issue in the final **Drill Diagram** section.
        - If you have any trouble with the drill submission process, email us at 
          [help@goaliegen.com](mailto:help@goaliegen.com) and we'll be happy to assist you.

  - type: markdown
    attributes:
      value: |
        ## Drill Information

        Fill out each field below. These values will be used to build the drill YAML.

  - type: textarea
    id: drill_name
    attributes:
      label: Name
      description: Enter the drill name.
      placeholder: Drill Name
    validations:
      required: true

  - type: textarea
    id: drill_description
    attributes:
      label: Description
      description: Provide a brief overview and purpose of the drill.
      placeholder: |
        A brief description of the drill. This can be multiple lines and should provide
        an overview of what the drill is about, its purpose, and any key details.
    validations:
      required: true

  - type: textarea
    id: drill_steps
    attributes:
      label: Drill Steps (Optional)
      description: Enter one drill step per line. Leave blank if not applicable.
      placeholder: |
        Drill step 1
        Drill step 2

  - type: textarea
    id: coaching_focus_points
    attributes:
      label: Coaching Focus Points
      description: Enter one coaching focus point per line.
      placeholder: |
        - Coaching focus point 1
        - Coaching focus point 2
        - Coaching focus point 3
    validations:
      required: true

  - type: textarea
    id: shooter_focus_points
    attributes:
      label: Shooter Focus Points (Optional)
      description: Enter one shooter focus point per line. Leave blank if not applicable.
      placeholder: |
        - Shooter focus point 1
        - Shooter focus point 2

  - type: textarea
    id: drill_progressions
    attributes:
      label: Drill Progressions (Optional)
      description: >-
        List or describe drill progressions or alterations coaches can use as needed.
        Leave blank if not applicable.
      placeholder: |
        1. Drill progression or alteration 1
        2. Drill progression or alteration 2

  - type: textarea
    id: video
    attributes:
      label: Video (Optional)
      description: Enter a YouTube or Vimeo URL.
      placeholder: |
        HTTPS-only YouTube or Vimeo URL. Accepted formats:
        https://www.youtube.com/watch?v=VIDEO_ID
        https://youtu.be/VIDEO_ID
        https://vimeo.com/NUMERIC_ID

  - type: input
    id: drill_creation_date
    attributes:
      label: Drill Creation Date
      description: Must be a valid calendar date in YYYY-MM-DD format.
      placeholder: YYYY-MM-DD
    validations:
      required: true

  - type: checkboxes
    id: skill_level_tags
    attributes:
      label: Tags - Skill Level
      description: Select all that apply.
      options:
        - label: beginner
        - label: intermediate
        - label: advanced

  - type: dropdown
    id: team_drill
    attributes:
      label: Tags - Team Drill
      description: Select one.
      options:
        - "yes"
        - "no"
      default: 1
    validations:
      required: true

  - type: checkboxes
    id: age_level_tags
    attributes:
      label: Tags - Age Level
      description: Select all that apply.
      options:
        - label: all
        - label: 10U_below
        - label: 12U
        - label: 14U
        - label: 16U_and_older
    validations:
      required: true

  - type: checkboxes
    id: fundamental_skill_tags
    attributes:
      label: Tags - Fundamental Skill
      description: Select all that apply.
      options:
        - label: skating
        - label: positioning
        - label: stance
        - label: save_selection
        - label: rebound_control
        - label: recovery
    validations:
      required: true

  - type: checkboxes
    id: skating_skill_tags
    attributes:
      label: Tags - Skating Skill
      description: Select all that apply.
      options:
        - label: shuffle
        - label: t_push
        - label: c_cut
        - label: butterfly
        - label: power_push
    validations:
      required: true

  - type: checkboxes
    id: equipment_tags
    attributes:
      label: Tags - Equipment
      description: Select all that apply.
      options:
        - label: blaze_pods
        - label: cones
        - label: goal
        - label: ice_marker
        - label: bumpers
        - label: none
    validations:
      required: true

  - type: textarea
    id: diagram_image_or_screenshot
    attributes:
      label: Drill Diagram(s)
      description: |
        Attach the drill diagram or a screenshot of the drill here.
      placeholder: Attach the drill diagram or a screenshot of the drill here.

  - type: markdown
    attributes:
      value: |
        ## GitHub Copilot Instructions

        - Use the information in the fields above to create a new drill YAML file in the `drills` folder.
        - Follow the instructions below to create the new drill.
        - Create a new folder under `drills` using lowercase letters and hyphens for spaces, based on the supplied `name` field.
        - Use the remaining fields to populate the drill YAML file, following the
          structure of existing drill YAML files and drills_samples as a guide.
        - The `coaching_focus_points` field is required. Map the "Coaching Focus Points" form field to it.
        - If "Drill Steps" was provided, add the `drill_steps` field as an array of strings
          directly below `description` in the YAML.
          Otherwise, leave it out entirely (do not include a commented-out placeholder).
        - If "Shooter Focus Points" was provided, add the `shooter_focus_points` field as an array.
          Otherwise, leave it out entirely (do not include a commented-out placeholder).
        - If "Drill Progressions" was provided, add the `drill_progressions` field as an array of strings.
          Otherwise, leave it out entirely.
        - Add the images to the folder, updating the `images` field as needed.
          If the images are pasted into the text area and not attached, make sure to save the images and add them to the drill folder,
          naming them after the drill name and updating the `images` field accordingly.
          If more than one image is included, add a suffix to the filename
          (e.g. `drill-name-1.jpg`, `drill-name-2.jpg`, etc.) and list all images in the YAML.
          Keep them in the order they are uploaded if in the text field, and alphabetical if attached.
        - Confirm image files are actual images, and that video links are real YouTube or Vimeo links.
        - Make sure the new drill passes build validation and that the site builds properly.
        - Submit the proposed changes as a PR, with a screenshot of the drill page in the PR description. Link the PR in this issue.
