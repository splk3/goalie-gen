name: New Drill Template
description: Use this template to submit a new drill for the site
title: "Add a new drill - [DRILL NAME HERE]"
labels:
  - new-drill
assignees:
  - splk3
  - copilot-swe-agent
body:
  - type: markdown
    attributes:
      value: |
        ## GitHub Copilot Instructions

        - Use the content in the **Drill Information** section to create a new drill.
        - Create a new folder under `drills` using lowercase letters and hyphens for spaces, based on the supplied `name` field.
        - Use the text to create the `drill.yml` file in that folder.
        - Add the images to the folder, updating the `images` field as needed.
        - Submit the proposed changes as a PR.
        - Confirm image files are actual images, and that video links are real YouTube or Vimeo links.
        - Make sure the new drill passes build validation and that the site builds properly.

  - type: markdown
    attributes:
      value: |
        ## Submitter Instructions

        Fill out the **Drill Information** field below.
        - Attach any diagrams/images to this issue.
        - Ensure image filenames in `images` match attachment filenames exactly.
        - Update tag selections in the YAML by removing values that do not apply.

  - type: textarea
    id: drill_information
    attributes:
      label: Drill Information
      description: Paste and complete this YAML. Keep valid YAML formatting.
      render: yaml
      value: |
        ---
        name: Drill Name

        description: |-
          A brief description of the drill. This can be multiple lines and should provide
          an overview of what the drill is about, its purpose, and any key details that
          would help someone understand what the drill entails.

        coaching_points:
          - Coaching point 1
          - Coaching point 2
          - Coaching point 3

        # must be a list
        images:
          - test-drill-image.png

        # HTTPS-only YouTube or Vimeo URL. Accepted formats:
        #   https://www.youtube.com/watch?v=VIDEO_ID
        #   https://youtu.be/VIDEO_ID
        #   https://vimeo.com/NUMERIC_ID
        video:

        # must be a valid calendar date in YYYY-MM-DD format
        drill_creation_date: YYYY-MM-DD

        # optional - use if updating existing drill - must be a valid calendar date in YYYY-MM-DD format
        drill_updated_date: ''

        # For each category below, remove the values that do not apply
        tags:
          skill_level:
            - beginner
            - intermediate
            - advanced
          # allowed values: yes or no (exactly one value required — change to "yes" if this is a team drill)
          team_drill:
            - no
          age_level:
            - all
            - 10U_below
            - 12U
            - 14U
            - 16U_and_older
          fundamental_skill:
            - skating
            - positioning
            - stance
            - save_selection
            - rebound_control
            - recovery
          skating_skill:
            - shuffle
            - t_push
            - c_cut
            - butterfly
            - power_push
          equipment:
            - blaze_pods
            - cones
            - goal
            - ice_marker
            - bumpers
            - none
    validations:
      required: true

  - type: checkboxes
    id: submitter_checks
    attributes:
      label: Final Checks
      description: Confirm before submitting.
      options:
        - label: I attached all referenced image/diagram files to this issue.
          required: true
        - label: I ensured `images` filenames exactly match my attachments.
          required: true
        - label: I updated the YAML tags to include only applicable values.
          required: true
