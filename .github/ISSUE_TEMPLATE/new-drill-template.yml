name: Add a New Drill
description: Use this template to submit a new drill for the site
title: "Add a new drill - [DRILL NAME HERE]"
labels:
  - goalie-drills
projects:
  - splk3/1
assignees:
  - splk3
body:
  - type: markdown
    attributes:
      value: |
        ## Submitter Instructions

        - Fill out the drill information by answering the questions below.
        - Attach each progression image in its matching progression field, and attach the main drill diagram in the final **Drill Diagram** section when you have one. If the diagram is only available as a PDF, attach the PDF and the drill-processing workflow will use a screenshot of the rink/drill diagram as the final drill image.
        - Drill text fields support markdown paragraphs/lists, including nested list indentation up to 3 levels. Use that formatting directly when needed.
        - Use `YYYY-MM-DD` date format for all drill date values (for example, `2026-01-15`). This applies to both `drill_creation_date` and `drill_updated_date` when an updated date is used.
        - If you have any trouble with the drill submission process, email us at
          [help@goaliegen.com](mailto:help@goaliegen.com) and we'll be happy to assist you.

  - type: markdown
    attributes:
      value: |
        ## Drill Information

        Fill out each field below. These values will be used to build the drill YAML.

  - type: textarea
    id: drill_name
    attributes:
      label: Name
      description: Enter the drill name.
      placeholder: Drill Name
    validations:
      required: true

  - type: textarea
    id: drill_description
    attributes:
      label: Description (Optional)
      description: Provide a brief overview and purpose of the drill using markdown text. Paragraphs and nested lists are supported (up to 3 levels). Leave blank if drill steps are sufficient.
      placeholder: |
        A brief description of the drill. This can be multiple lines and should provide
        an overview of what the drill is about, its purpose, and any key details.

  - type: textarea
    id: drill_steps
    attributes:
      label: Drill Steps
      description: Enter markdown list content. Use a single-tier list for ordered steps. Use nested/indented list items for bullet-point sub-details.
      placeholder: |
        1. Drill step 1
        2. Drill step 2
           - Optional sub-detail as a bullet
    validations:
      required: true

  - type: textarea
    id: coaching_focus_points
    attributes:
      label: Coaching Focus Points
      description: Enter markdown bullet content. Nested/indented bullets are supported.
      placeholder: |
        - Movement Quality
          - Explode on the first push
          - Arrive set at each point
        - Body Positioning
          - Hands in front
          - Stick centered on the ice
        - Track puck into body
    validations:
      required: true

  - type: textarea
    id: shooter_focus_points
    attributes:
      label: Shooter Focus Points (Optional)
      description: Enter markdown bullet/list content. Nested/indented lists are supported up to 3 levels. Leave blank if not applicable.
      placeholder: |
        - Shooter focus point 1
        - Shooter focus point 2

  - type: textarea
    id: video
    attributes:
      label: Video (Optional)
      description: Enter a YouTube or Vimeo URL.
      placeholder: |
        HTTPS-only YouTube or Vimeo URL. Accepted formats:
        https://www.youtube.com/watch?v=VIDEO_ID
        https://youtu.be/VIDEO_ID
        https://vimeo.com/NUMERIC_ID

  - type: input
    id: drill_creation_date
    attributes:
      label: Drill Creation Date
      description: Must be a valid calendar date in YYYY-MM-DD format.
      placeholder: YYYY-MM-DD
    validations:
      required: true

  - type: checkboxes
    id: skill_level_tags
    attributes:
      label: Tags - Skill Level
      description: Select all that apply.
      options:
        - label: beginner
        - label: intermediate
        - label: advanced

  - type: dropdown
    id: team_drill
    attributes:
      label: Tags - Team Drill
      description: Select one.
      options:
        - "yes"
        - "no"
      default: 1
    validations:
      required: true

  - type: checkboxes
    id: age_level_tags
    attributes:
      label: Tags - Age Level
      description: Select all that apply.
      options:
        - label: all
        - label: 10U_below
        - label: 12U
        - label: 14U
        - label: 16U_and_older
    validations:
      required: true

  - type: checkboxes
    id: fundamental_skill_tags
    attributes:
      label: Tags - Fundamental Skill
      description: Select all that apply.
      options:
        - label: skating
        - label: positioning
        - label: stance
        - label: save_selection
        - label: rebound_control
        - label: recovery
    validations:
      required: true

  - type: checkboxes
    id: skating_skill_tags
    attributes:
      label: Tags - Skating Skill
      description: Select all that apply.
      options:
        - label: shuffle
        - label: t_push
        - label: c_cut
        - label: butterfly
        - label: power_push
    validations:
      required: true

  - type: checkboxes
    id: game_situations_tags
    attributes:
      label: Tags - Game Situations (Optional)
      description: Select all that apply. This tag group can be used for any drill (team or non-team).
      options:
        - label: power_play
        - label: penalty_kill
        - label: net_front_traffic
        - label: dump_in
        - label: stick_handling
        - label: odd_man_rush
        - label: macro_game
        - label: small_sided_game
        - label: small_unit_play
        - label: opposed_practice
        - label: unopposed_practice

  - type: checkboxes
    id: equipment_tags
    attributes:
      label: Tags - Equipment
      description: Select all that apply.
      options:
        - label: blaze_pods
        - label: cones
        - label: ice_marker
        - label: bumpers
        - label: none
    validations:
      required: true

  - type: checkboxes
    id: space_required_tags
    attributes:
      label: Tags - Space Required
      description: |
        Select all that apply. If no option is selected, `flexible` will be used by default.
      options:
        - label: full_ice
        - label: half_ice
        - label: whole_zone
        - label: half_zone
        - label: crease_only
        - label: flexible

  - type: textarea
    id: diagram_image_or_screenshot
    attributes:
      label: Drill Diagram (Optional)
      description: |
        Attach the drill diagram or a screenshot of the drill here if one is available. If you only have a PDF, attach it here and the processing workflow will use a screenshot of the rink/drill diagram from the PDF.
      placeholder: Attach the drill diagram, screenshot, or PDF here if available.

  - type: markdown
    attributes:
      value: |
        ## Drill Progressions (Optional)

        Add up to 8 progression entries. Leave any progression fields blank if not needed.

  - type: input
    id: progression_1_name
    attributes:
      label: Progression 1 Name (Optional)
      description: Enter the name/title for progression 1.
      placeholder: Progression 1

  - type: textarea
    id: progression_1_description
    attributes:
      label: Progression 1 Description and Diagram (Optional)
      description: Enter progression 1 details as markdown text (paragraphs/lists; nested lists supported up to 3 levels). Attach a progression image file here if applicable.
      placeholder: Describe progression 1 here. Attach a progression image file here if needed.

  - type: input
    id: progression_2_name
    attributes:
      label: Progression 2 Name (Optional)
      description: Enter the name/title for progression 2.
      placeholder: Progression 2

  - type: textarea
    id: progression_2_description
    attributes:
      label: Progression 2 Description and Diagram (Optional)
      description: Enter progression 2 details as markdown text (paragraphs/lists; nested lists supported up to 3 levels). Attach a progression image file here if applicable.
      placeholder: Describe progression 2 here. Attach a progression image file here if needed.

  - type: input
    id: progression_3_name
    attributes:
      label: Progression 3 Name (Optional)
      description: Enter the name/title for progression 3.
      placeholder: Progression 3

  - type: textarea
    id: progression_3_description
    attributes:
      label: Progression 3 Description and Diagram (Optional)
      description: Enter progression 3 details as markdown text (paragraphs/lists; nested lists supported up to 3 levels). Attach a progression image file here if applicable.
      placeholder: Describe progression 3 here. Attach a progression image file here if needed.

  - type: input
    id: progression_4_name
    attributes:
      label: Progression 4 Name (Optional)
      description: Enter the name/title for progression 4.
      placeholder: Progression 4

  - type: textarea
    id: progression_4_description
    attributes:
      label: Progression 4 Description and Diagram (Optional)
      description: Enter progression 4 details as markdown text (paragraphs/lists; nested lists supported up to 3 levels). Attach a progression image file here if applicable.
      placeholder: Describe progression 4 here. Attach a progression image file here if needed.

  - type: input
    id: progression_5_name
    attributes:
      label: Progression 5 Name (Optional)
      description: Enter the name/title for progression 5.
      placeholder: Progression 5

  - type: textarea
    id: progression_5_description
    attributes:
      label: Progression 5 Description and Diagram (Optional)
      description: Enter progression 5 details as markdown text (paragraphs/lists; nested lists supported up to 3 levels). Attach a progression image file here if applicable.
      placeholder: Describe progression 5 here. Attach a progression image file here if needed.

  - type: input
    id: progression_6_name
    attributes:
      label: Progression 6 Name (Optional)
      description: Enter the name/title for progression 6.
      placeholder: Progression 6

  - type: textarea
    id: progression_6_description
    attributes:
      label: Progression 6 Description and Diagram (Optional)
      description: Enter progression 6 details as markdown text (paragraphs/lists; nested lists supported up to 3 levels). Attach a progression image file here if applicable.
      placeholder: Describe progression 6 here. Attach a progression image file here if needed.

  - type: input
    id: progression_7_name
    attributes:
      label: Progression 7 Name (Optional)
      description: Enter the name/title for progression 7.
      placeholder: Progression 7

  - type: textarea
    id: progression_7_description
    attributes:
      label: Progression 7 Description and Diagram (Optional)
      description: Enter progression 7 details as markdown text (paragraphs/lists; nested lists supported up to 3 levels). Attach a progression image file here if applicable.
      placeholder: Describe progression 7 here. Attach a progression image file here if needed.

  - type: input
    id: progression_8_name
    attributes:
      label: Progression 8 Name (Optional)
      description: Enter the name/title for progression 8.
      placeholder: Progression 8

  - type: textarea
    id: progression_8_description
    attributes:
      label: Progression 8 Description and Diagram (Optional)
      description: Enter progression 8 details as markdown text (paragraphs/lists; nested lists supported up to 3 levels). Attach a progression image file here if applicable.
      placeholder: Describe progression 8 here. Attach a progression image file here if needed.

  - type: markdown
    attributes:
      value: |
        ## GitHub Copilot Instructions - Users can ignore this section

        - Process this issue using the `new-drill-from-issue` skill.
        - Follow the detailed schema, image naming, validation, and PR instructions in [.agents/skills/new-drill-from-issue/SKILL.md](.agents/skills/new-drill-from-issue/SKILL.md) and [AGENTS.md](AGENTS.md).
