version: 2
updates:
  # Enable version updates for npm
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    cooldown:
      default-days: 3
    groups:
      npm-all:
        patterns:
          - "*"
  
  # Enable version updates for GitHub Actions
  # NOTE: Dependabot does not support file-pattern exclusions for github-actions.
  # It will update actions in *.lock.yml files (generated by gh aw compile) as well
  # as regular workflow files. Dependabot updates both the *.lock.yml files and
  # .github/aw/actions-lock.json together, so `gh aw compile` will remain in sync.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
