name: Test Build

on:
  pull_request:
    branches:
      - "**"
  workflow_dispatch:
  schedule:
    # Run weekly on Saturday at 3:00 AM UTC (after super-linter runs)
    - cron: "0 3 * * 6"

permissions: {}

jobs:
  test-build:
    name: Test Gatsby Build
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Build site
        run: npm run build
        env:
          PREFIX_PATHS: "true"

      - name: Verify build output
        run: |
          if [ ! -d "public" ]; then
            echo "Error: public/ directory was not generated"
            exit 1
          fi
          echo "Build successful - public/ directory exists"
          ls -la public/
