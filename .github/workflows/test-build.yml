name: Test Build

on:
  pull_request:
    branches:
      - "**"
  workflow_dispatch:
  schedule:
    # Run weekly on Saturday at 3:00 AM UTC (after super-linter runs)
    - cron: "0 3 * * 6"

jobs:
  test-build:
    name: Test Gatsby Build
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Build site
        run: npm run build
        env:
          PREFIX_PATHS: "true"

      - name: Verify build output
        run: |
          if [ ! -d "public" ]; then
            echo "Error: public/ directory was not generated"
            exit 1
          fi
          echo "Build successful - public/ directory exists"
          ls -la public/
