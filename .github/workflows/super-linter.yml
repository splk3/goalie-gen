name: Lint Code Base

on:
  push:
    branches:
      - "**"
  schedule:
    # Run weekly on Saturday at 2:00 AM UTC (Friday night US time zones)
    - cron: "0 2 * * 6"
  workflow_dispatch:

jobs:
  super-lint:
    name: Lint Code Base
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: read
      statuses: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Full git history is needed for super-linter
          fetch-depth: 0
          persist-credentials: false

      - name: Lint Code Base
        uses: super-linter/super-linter/slim@9e863354e3ff62e0727d37183162c4a88873df41 # v8.6.0
        env:
          VALIDATE_ALL_CODEBASE: true
          DEFAULT_BRANCH: main
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LINTER_RULES_PATH: .github/linters
          # Disable Biome linters to avoid conflicts with other linters
          VALIDATE_JAVASCRIPT_BIOME: false
          VALIDATE_TYPESCRIPT_BIOME: false
